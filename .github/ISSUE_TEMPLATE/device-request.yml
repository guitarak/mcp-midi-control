name: Device support request
description: Add support for a new MIDI device (amp modeler, synth, etc.).
title: "[device] "
labels: [enhancement, device-support]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the request. mcp-midi-control' design is built to take
        new devices via the `DeviceDescriptor` pattern — see
        `docs/MULTI-DEVICE-ROADMAP.md` for the porting guide and
        `src/asm/hydrasynth-explorer/` for a reference descriptor that
        handles a non-Fractal device cleanly.

        Filling this template helps us understand what RE work the
        port needs.

  - type: input
    id: device
    attributes:
      label: Device name + firmware
      placeholder: "Line 6 Helix Floor, firmware 3.50"
    validations:
      required: true

  - type: input
    id: connection
    attributes:
      label: How does it connect to a host computer?
      placeholder: "USB MIDI class-compliant / vendor driver / requires editor app"
    validations:
      required: true

  - type: dropdown
    id: protocol_docs
    attributes:
      label: Is the MIDI protocol documented?
      options:
        - Official vendor SysEx spec exists
        - Partial vendor docs + community wiki
        - Community-RE only (no vendor docs)
        - Undocumented (would need capture-based RE)
    validations:
      required: true

  - type: textarea
    id: protocol_refs
    attributes:
      label: Protocol references
      description: |
        Link to vendor docs, community wikis, or other projects that
        have decoded this device. Even partial info helps.
      placeholder: |
        - https://line6.com/data/6/...
        - https://github.com/.../helix-decoder
    validations:
      required: false

  - type: dropdown
    id: contribute
    attributes:
      label: Are you offering to contribute the port?
      options:
        - "Yes — I own the hardware and want to author the descriptor"
        - "Maybe — willing to help test if someone else writes the descriptor"
        - "No — just requesting"
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: What capabilities do you want first?
      description: |
        Suggested minimums: switch_preset, get_param, set_param, describe_device.
        Beyond that — apply_preset (whole-preset builds), scenes, channel
        switching, lineage data, etc. are nice-to-have.
      placeholder: |
        - Switch preset by Bank+PC
        - Read/write amp drive + EQ on the active preset
        - Switch scenes (if applicable)
    validations:
      required: false
